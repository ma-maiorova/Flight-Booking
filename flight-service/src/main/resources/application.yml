server:
  port: 8081

spring:
  application:
    name: flight-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flight_db}
    username: ${DB_USER:flight_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.sql
    enabled: true

  data:
    redis:
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES:redis-sentinel:26379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

grpc:
  server:
    port: ${GRPC_PORT:9090}

flight-service:
  api-key: ${FLIGHT_SERVICE_PASSWORD}
  cache:
    ttl-minutes: ${CACHE_TTL_MINUTES:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    com.flightbooking: INFO
    io.grpc: WARN
