version: "3.9"

services:

  # ─── PostgreSQL: Flight Service ──────────────────────────────────────────────
  postgres-flight:
    image: postgres:16-alpine
    container_name: postgres-flight
    env_file: .env
    environment:
      POSTGRES_DB: flight_db
      POSTGRES_USER: flight_user
      POSTGRES_PASSWORD: ${FLIGHT_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-flight-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight_user -d flight_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── PostgreSQL: Booking Service ─────────────────────────────────────────────
  postgres-booking:
    image: postgres:16-alpine
    container_name: postgres-booking
    env_file: .env
    environment:
      POSTGRES_DB: booking_db
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres-booking-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis Sentinel Setup ────────────────────────────────────────────────────
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-master.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis-replica.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6380:6379"
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-sentinel:
    image: redis:7-alpine
    container_name: redis-sentinel
    command: redis-sentinel /usr/local/etc/redis/sentinel.conf
    volumes:
      - ./redis/sentinel.conf:/usr/local/etc/redis/sentinel.conf
    ports:
      - "26379:26379"
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy

  # ─── Flight Service ──────────────────────────────────────────────────────────
  flight-service:
    build:
      context: .
      dockerfile: flight-service/Dockerfile
    container_name: flight-service
    env_file: .env
    environment:
      DB_HOST: postgres-flight
      DB_PORT: 5432
      DB_NAME: flight_db
      DB_USER: flight_user
      DB_PASSWORD: ${FLIGHT_DB_PASSWORD}
      GRPC_PORT: 9090
      FLIGHT_SERVICE_PASSWORD: ${FLIGHT_SERVICE_PASSWORD}
      REDIS_SENTINEL_MASTER: mymaster
      REDIS_SENTINEL_NODES: redis-sentinel:26379
      CACHE_TTL_MINUTES: 10
    ports:
      - "9090:9090"
      - "8081:8081"
    depends_on:
      postgres-flight:
        condition: service_healthy
      redis-sentinel:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── Booking Service ─────────────────────────────────────────────────────────
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    env_file: .env
    environment:
      DB_HOST: postgres-booking
      DB_PORT: 5432
      DB_NAME: booking_db
      DB_USER: booking_user
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      SERVER_PORT: 8080
      FLIGHT_SERVICE_HOST: flight-service
      FLIGHT_SERVICE_GRPC_PORT: 9090
      FLIGHT_SERVICE_PASSWORD: ${FLIGHT_SERVICE_PASSWORD}
      CB_FAILURE_THRESHOLD: 5
      CB_TIMEOUT_SECONDS: 30
      CB_HALF_OPEN_MAX_CALLS: 3
      RETRY_MAX_ATTEMPTS: 3
      RETRY_INITIAL_BACKOFF_MS: 100
    ports:
      - "8080:8080"
    depends_on:
      postgres-booking:
        condition: service_healthy
      flight-service:
        condition: service_healthy

volumes:
  postgres-flight-data:
  postgres-booking-data:
